; ============================================================================
; tradeskills.ini - shared recipe/vendor data for the Tradeskill Suite
; ============================================================================
;
; [Skill:<Name>] sections define the UI picker only.
;   Items=    comma-separated list of items shown in the UI for this skill
;   Skill=    EQ skill name for the level readout (Me.Skill())
;
; [Recipe:<Item Name>] sections are fully self-contained.
; Every recipe MUST define its own Container= and ContainerType=.
; Recipes do not inherit anything from their Skill section.
; This means any recipe can be used as a subcombine by any other recipe,
; regardless of which skill list it appears in.
;
;   Yield=<n>               how many the combine produces
;   Trivial=<n>             skill level at which combine becomes trivial
;   Sellable=false          set for items vendors won't buy (unfired pottery etc.)
;   Container=<Name>        the container for this combine (bag name or world station name)
;   ContainerType=inventory|world
;                           inventory = bag in pack slot, world = clickable station
;   NavLoc=<y> <x> <z>     for world containers: /nav loc coordinates
;   Ingredient1=Name|Qty[|returned|subcombine]
;   Ingredient2=...  (sequential, no gaps)
;
;   returned  = item comes back after combine, only buy 1 regardless of quantity
;   subcombine = item is crafted by another recipe; engine makes it automatically
;
; ============================================================================

[Vendors]
; Override map: force a specific vendor for an item, overriding the auto-discovered
; list from merchants.ini. Only add entries here if you need to prefer one vendor
; over others. Leave empty to use merchants.ini auto-discovery for everything.
; Format: ItemName=Vendor NPC Name

